<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Harness</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- 侧边栏 -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
            <path d="M8 12l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Agent Harness</span>
        </div>
        <button id="btn-new-chat" class="btn-new-chat" title="新建对话">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <!-- Agent 选择器 -->
      <div class="agent-selector">
        <label class="selector-label">当前智能体</label>
        <select id="agent-select" class="agent-select"></select>
      </div>

      <!-- 会话列表 -->
      <div class="sessions-list" id="sessions-list">
        <!-- 动态填充 -->
      </div>

      <div class="sidebar-footer">
        <div class="footer-info">Multi-Agent 协作平台</div>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main id="main-content" class="main-content">
      <!-- 顶部栏 -->
      <header class="topbar">
        <button id="btn-toggle-sidebar" class="btn-icon" title="切换侧边栏">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12h18M3 6h18M3 18h18" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="topbar-title" id="topbar-title">新对话</div>
        <div class="topbar-agent" id="topbar-agent"></div>
      </header>

      <!-- 聊天区域 -->
      <div class="chat-container" id="chat-container">
        <!-- 欢迎页 -->
        <div id="welcome-screen" class="welcome-screen">
          <div class="welcome-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
              <path d="M8 12l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <h2>Agent Harness</h2>
          <p class="welcome-desc">Multi-Agent 智能体协作平台</p>
          <div class="quick-actions" id="quick-actions">
            <!-- 动态填充 -->
          </div>
        </div>

        <!-- 消息列表 -->
        <div id="messages" class="messages"></div>
      </div>

      <!-- 输入区域 -->
      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            id="message-input"
            class="message-input"
            placeholder="输入任务指令..."
            rows="1"
          ></textarea>
          <button id="btn-send" class="btn-send" disabled title="发送">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="input-hint">按 Enter 发送，Shift+Enter 换行</div>
      </div>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
